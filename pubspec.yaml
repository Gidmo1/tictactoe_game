name: tictactoe_game
description: "A place to play tictactoe with everyone."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: "^1.12.0"
  firebase_core: ^4.0.0
  firebase_database: ^12.0.0
  sqflite: ^2.4.2
  firebase_auth: ^6.0.1
  audioplayers: ^6.5.0
  flame_audio: ^2.11.10
  cloud_firestore: ^6.0.0
  flutter_facebook_auth: 6.2.0
  firebase_ui_auth: ^3.0.0
  firebase_ui_oauth_facebook: ^2.0.0

  



  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/X.png
    - assets/images/O.png
    - assets/images/empty.png
    - assets/images/play.png
    - assets/images/background.png
    - assets/images/continue_as_guest_button.png
    - assets/images/login_button.png
    - assets/images/signup_button.png
    - assets/images/settings.png
    - assets/images/restart.png
    - assets/images/notifications.png
    - assets/images/return.png
    - assets/images/playscreen.png
    - assets/images/competition.png
    - assets/images/joinatournament.png
    - assets/images/settings_screen.png
    - assets/images/vsfriend.png
    - assets/images/vscomputer.png
    - assets/audio/lose.wav
    - assets/audio/win.wav
    - assets/audio/tap.wav

