name: tictactoe_game
description: "A place to play tictactoe with everyone."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: "^1.12.0"
  firebase_core: ^4.0.0
  firebase_database: ^12.0.0
  sqflite: ^2.4.2
  firebase_auth: ^6.0.1
  audioplayers: ^6.5.0
  flame_audio: ^2.11.10
  cloud_firestore: ^6.0.0
  flutter_facebook_auth: 6.2.0
  firebase_ui_auth: ^3.0.0
  firebase_ui_oauth_facebook: ^2.0.0
  font_awesome_flutter: ^10.6.0
  cloud_functions: ^6.0.2
  get_it: ^8.2.0
  shared_preferences: ^2.5.3

  



  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

